<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Swoosh line: low left, rises through heart, sweeps up to top right -->
  <path d="M 60 295 Q 180 270 248 215 Q 290 170 420 60" fill="none" stroke="#161318" stroke-width="7" stroke-linecap="round"/>

  <!-- Heart centered at ~248,210 -->
  <path d="M 248 240
    C 248 240 196 205 196 172
    C 196 153 210 142 224 142
    C 234 142 244 149 248 157
    C 252 149 262 142 272 142
    C 286 142 300 153 300 172
    C 300 205 248 240 248 240 Z"
    fill="none" stroke="#8B1E2D" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ALL HEART -->
  <text x="250" y="320"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="72"
    fill="#161318"
    text-anchor="middle"
    letter-spacing="4">ALL HEART</text>

  <!-- Thin rule -->
  <line x1="105" y1="338" x2="395" y2="338" stroke="#888" stroke-width="1.2"/>

  <!-- PERFORMANCE -->
  <text x="250" y="372"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="36"
    fill="#8B1E2D"
    text-anchor="middle"
    letter-spacing="10">PERFORMANCE</text>

  <!-- SCIENCE IMPLEMENTED WITH HEART -->
  <text x="250" y="420"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="20"
    fill="#444"
    text-anchor="middle"
    letter-spacing="5">SCIENCE IMPLEMENTED WITH HEART</text>
</svg>
