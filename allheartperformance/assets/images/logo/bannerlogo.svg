<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 100" width="620" height="100">

  <!-- Swoosh: starts bottom-left of heart area, sweeps right and up -->
  <path d="M 18 72 Q 42 58 58 44 Q 66 34 78 22" fill="none" stroke="#161318" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Heart centered at ~58, 48 -->
  <path d="M 58 65
    C 58 65 36 50 36 35
    C 36 25 44 19 52 19
    C 55.5 19 58.5 21.5 60 24.5
    C 61.5 21.5 64.5 19 68 19
    C 76 19 84 25 84 35
    C 84 50 62 65 58 65 Z"
    fill="none" stroke="#8B1E2D" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ALL HEART -->
  <text x="105" y="58"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="44"
    fill="#161318"
    letter-spacing="2">ALL HEART</text>

  <!-- PERFORMANCE — vertically centred, to the right -->
  <text x="105" y="80"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="20"
    fill="#8B1E2D"
    letter-spacing="8">PERFORMANCE</text>

</svg>
